<script>
// ===== SUPABASE =====
const sb = supabase.createClient(
  'https://sbmhioyxdjecyumarhek.supabase.co',
  'sb_publishable_j5hylMpKHP5aRRJbp03gAg_Rd_lPZn4'
);

// ===== STATE =====
let G = {
  room:null,
  name:null,
  isHost:false,
  players:[],
  channel:null,
  q:[],
  i:0,
  score:0
};

// ===== UI =====
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== ROOM CODE =====
function gen(){
  let s="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array(4).fill().map(()=>s[Math.random()*s.length|0]).join('');
}

// ===== REALTIME =====
function sub(code){
  if(G.channel) sb.removeChannel(G.channel);

  G.channel = sb.channel("room-"+code, {
    config:{broadcast:{self:true}}
  });

  G.channel
    // PLAYER JOIN
    .on('broadcast',{event:'join'},({payload})=>{
      if(!G.players.includes(payload)){
        G.players.push(payload);
        render();
      }
    })

    // HOST SYNC FULL LIST
    .on('broadcast',{event:'sync'},({payload})=>{
      G.players = payload;
      render();
    })

    // START GAME
    .on('broadcast',{event:'start'},({payload})=>{
      G.q = payload;
      startQuiz();
    })

    .subscribe(async(status)=>{
      if(status === "SUBSCRIBED"){

        // SEND JOIN
        await G.channel.send({
          type:'broadcast',
          event:'join',
          payload:G.name
        });

        // HOST SEND FULL LIST
        if(G.isHost){
          setTimeout(()=>{
            G.channel.send({
              type:'broadcast',
              event:'sync',
              payload:G.players
            });
          },300);
        }
      }
    });
}

// ===== CREATE =====
function createGame(){
  let n = document.getElementById('host-name').value.trim();
  if(!n) return showToast("Enter your name","wrong");

  G.name = n;
  G.isHost = true;
  G.room = gen();

  G.players = [n];

  document.getElementById('roomCode').innerText = G.room;

  show('host');
  render();
  sub(G.room);
}

// ===== JOIN =====
function joinGame(){
  let n = document.getElementById('join-name').value.trim();
  let c = document.getElementById('code').value.toUpperCase().trim();

  if(!n) return showToast("Enter name","wrong");
  if(c.length !== 4) return showToast("Invalid code","wrong");

  G.name = n;
  G.room = c;
  G.isHost = false;

  G.players = []; // 🔥 no fake self add

  show('guest');
  sub(c);
}

// ===== RENDER =====
function render(){
  const html = G.players.map(p=>`<div class="player-tag">${p}</div>`).join('');

  const el1 = document.getElementById('players');
  const el2 = document.getElementById('players2');

  if(el1) el1.innerHTML = html;
  if(el2) el2.innerHTML = html;

  const txt = `${G.players.length} player${G.players.length!==1?'s':''} in lobby`;

  if(document.getElementById('playerCount'))
    document.getElementById('playerCount').innerText = txt;

  if(document.getElementById('playerCount2'))
    document.getElementById('playerCount2').innerText = txt;
}

// ===== START GAME =====
async function startGame(){
  if(!G.isHost) return;

  if(G.players.length < 2){
    return showToast("Need 2 players","wrong");
  }

  let q = buildQ();

  await G.channel.send({
    type:'broadcast',
    event:'start',
    payload:q
  });
}

// ===== QUIZ =====
function startQuiz(){
  G.i = 0;
  G.score = 0;
  show('quiz');
  loadQ();
}

function loadQ(){
  let x = G.q[G.i];

  document.getElementById('q').innerText = x.q;
  document.getElementById('qCounter').innerText = `Q ${G.i+1}/25`;
  document.getElementById('progressBar').style.width = ((G.i/25)*100)+'%';
  document.getElementById('scoreDisplay').innerText = G.score;

  const letters = ['A','B','C','D'];

  document.getElementById('opts').innerHTML = x.a.map((o,i)=>
    `<button class="opt-btn" onclick="ans(${i},this)" id="opt${i}">
      <span class="opt-letter">${letters[i]}</span>${o}
    </button>`
  ).join('');
}

function ans(i,btn){
  let x = G.q[G.i];
  let correct = (i===x.c);

  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);

  btn.classList.add(correct?'correct':'wrong');
  document.getElementById('opt'+x.c).classList.add('correct');

  if(correct){
    G.score++;
    showToast("Correct","correct");
  } else {
    showToast("Wrong","wrong");
  }

  setTimeout(()=>{
    G.i++;
    if(G.i<25) loadQ();
    else endGame();
  },1000);
}

function endGame(){
  document.getElementById('finalScore').innerText = G.score;
  show('gameover');
}

// ===== TOAST =====
function showToast(msg,type){
  const t = document.getElementById('feedback-toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(()=> t.className='',1500);
}
</script>
