<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anime Quiz Multiplayer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
.screen { display:none; }
.active { display:block; }
button { padding:10px 20px; margin:10px; cursor:pointer; }
.player { margin:5px; }
</style>
</head>

<body>

<h1>Anime Quiz 🎮</h1>

<!-- HOME -->
<div id="home" class="screen active">
<button onclick="show('create')">Create</button>
<button onclick="show('join')">Join</button>
</div>

<!-- CREATE -->
<div id="create" class="screen">
<input id="host-name" placeholder="Name">
<button onclick="createGame()">Create Room</button>
</div>

<!-- JOIN -->
<div id="join" class="screen">
<input id="join-name" placeholder="Name"><br>
<input id="code" placeholder="Room Code">
<button onclick="joinGame()">Join</button>
</div>

<!-- WAIT HOST -->
<div id="host" class="screen">
<h2>Code: <span id="roomCode"></span></h2>
<div id="players"></div>
<button onclick="startGame()">START GAME</button>
</div>

<!-- WAIT GUEST -->
<div id="guest" class="screen">
<h2>Waiting for host...</h2>
<div id="players2"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<h2 id="q"></h2>
<div id="opts"></div>
</div>

<script>
// ===== SUPABASE =====
const sb = supabase.createClient(
'https://sbmhioyxdjecyumarhek.supabase.co',
'sb_publishable_j5hylMpKHP5aRRJbp03gAg_Rd_lPZn4'
);

// ===== STATE =====
let G = {room:null,name:null,isHost:false,players:[],channel:null,q:[],i:0};

// ===== QUESTIONS =====
const famous = [
{q:"Naruto MC?",a:["Naruto","Sasuke","Sakura","Lee"],c:0},
{q:"Luffy power?",a:["Fire","Rubber","Ice","Wind"],c:1},
{q:"AOT hero?",a:["Levi","Eren","Armin","Reiner"],c:1},
{q:"DBZ form?",a:["SSJ","SSJ2","Ultra Instinct","Kaioken"],c:2},
{q:"Death Note user?",a:["L","Light","Near","Misa"],c:1},
{q:"Tanjiro skill?",a:["Fire","Water","Wind","Thunder"],c:1},
{q:"One Piece crew?",a:["Red","Straw","Black","Heart"],c:1},
{q:"Bleach sword?",a:["Zangetsu","Enma","Yoru","Blade"],c:0},
{q:"Tokyo Ghoul MC?",a:["Kaneki","Touka","Amon","Hide"],c:0},
{q:"Haikyuu sport?",a:["Football","Cricket","Volley","Tennis"],c:2},
{q:"MHA hero?",a:["Deku","Bakugo","Todo","Iida"],c:0},
{q:"Hunter anime?",a:["HXH","Naruto","OP","Bleach"],c:0},
{q:"Saitama anime?",a:["OPM","Naruto","DBZ","AOT"],c:0},
{q:"Jujutsu MC?",a:["Gojo","Yuji","Megumi","Sukuna"],c:1},
{q:"Chainsaw man?",a:["Denji","Aki","Power","Makima"],c:0},
{q:"Fairy guild?",a:["Blue","Fairy","Red","Black"],c:1},
{q:"Geass power?",a:["Sharingan","Geass","Magic","Nen"],c:1},
{q:"Black clover MC?",a:["Asta","Yuno","Noelle","Yami"],c:0},
{q:"Pokemon MC?",a:["Ash","Red","Blue","Gary"],c:0},
{q:"Dr Stone genius?",a:["Senku","Taiju","Gen","Chrome"],c:0},
];

const rare = [
{q:"Steins Gate device?",a:["Phone","Clock","Portal","Microwave"],c:3},
{q:"Berserk sword?",a:["Dragon","Excalibur","Blade","Katana"],c:0},
{q:"Vinland MC?",a:["Thorfinn","Canute","Bjorn","Ask"],c:0},
{q:"Rezero revive?",a:["Loop","Death","Return by death","Magic"],c:2},
{q:"No game duo?",a:["Alpha","Blank","Zero","Void"],c:1},
];

let used = new Set();

function getQ(arr){
 let x;
 do{x=arr[Math.floor(Math.random()*arr.length)]}
 while(used.has(x.q));
 used.add(x.q);
 return x;
}

function buildQ(){
 used.clear();
 let q=[];
 for(let i=0;i<20;i++) q.push(getQ(famous));
 for(let i=0;i<5;i++) q.push(getQ(rare));
 return q.sort(()=>Math.random()-0.5);
}

// ===== UI =====
function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// ===== CODE =====
function gen(){
 let s="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
 return Array(4).fill().map(()=>s[Math.random()*s.length|0]).join('');
}

// ===== SUBSCRIBE =====
function sub(code){
 if(G.channel) sb.removeChannel(G.channel);

 G.channel = sb.channel("room-"+code,{config:{broadcast:{self:true}}});

 G.channel
 .on('broadcast',{event:'join'},({payload})=>{
  if(!G.players.includes(payload.name)){
   G.players.push(payload.name);
   render();
  }
 })
 .on('broadcast',{event:'start'},({payload})=>{
  G.q=payload;
  start();
 })
 .subscribe(async(s)=>{
  if(s=="SUBSCRIBED"){
   await G.channel.send({type:'broadcast',event:'join',payload:G.name});
  }
 });
}

// ===== CREATE =====
function createGame(){
 let n=host-name.value;
 if(!n) return alert("enter name");

 G.name=n; G.isHost=true;
 G.room=gen(); G.players=[n];

 roomCode.innerText=G.room;

 show('host'); render();
 sub(G.room);
}

// ===== JOIN =====
function joinGame(){
 let n=join-name.value;
 let c=code.value.toUpperCase();
 if(!n||c.length!=4) return alert("wrong");

 G.name=n; G.room=c;
 G.players=[n];

 show('guest'); render();
 sub(c);
}

// ===== RENDER =====
function render(){
 players.innerHTML=G.players.map(p=>`<div class="player">${p}</div>`).join('');
 players2.innerHTML=players.innerHTML;
}

// ===== START =====
async function startGame(){
 if(G.players.length<2) return alert("need 2");

 let q=buildQ();
 await G.channel.send({type:'broadcast',event:'start',payload:q});
 start();
}

// ===== QUIZ =====
function start(){
 G.i=0;
 show('quiz');
 load();
}

function load(){
 let x=G.q[G.i];
 q.innerText = x.q;

 opts.innerHTML = x.a.map((o,i)=>
  `<button onclick="ans(${i})">${o}</button>`
 ).join('');
}

function ans(i){
 let x=G.q[G.i];
 alert(i==x.c?"Correct":"Wrong");

 G.i++;
 if(G.i<25) load();
 else alert("Game Over 🎉");
}
</script>

</body>
</html>
