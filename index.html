<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Quiz Multiplayer</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#0a0a1a; color:white; text-align:center; }
.screen { display:none; }
.active { display:block; }
button { padding:10px; margin:5px; }
.player { margin:5px; }
</style>
</head>

<body>

<h1>ANIME QUIZ</h1>

<!-- HOME -->
<div id="home" class="screen active">
  <button onclick="show('create')">CREATE</button>
  <button onclick="show('join')">JOIN</button>
</div>

<!-- CREATE -->
<div id="create" class="screen">
  <input id="host-name" placeholder="Name"><br>
  <button onclick="createGame()">CREATE ROOM</button><br>
  <button onclick="show('home')">BACK</button>
</div>

<!-- JOIN -->
<div id="join" class="screen">
  <input id="join-name" placeholder="Name"><br>
  <input id="code" placeholder="CODE"><br>
  <button onclick="joinGame()">JOIN</button><br>
</div>

<!-- HOST -->
<div id="host" class="screen">
  <h2>ROOM: <span id="roomCode"></span></h2>
  <div id="players"></div>
  <button onclick="startGame()">START</button>
</div>

<!-- GUEST -->
<div id="guest" class="screen">
  <h2>WAITING...</h2>
  <div id="players2"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <h3 id="q"></h3>
  <div id="opts"></div>
  <p>Score: <span id="score">0</span></p>
</div>

<!-- GAME OVER -->
<div id="gameover" class="screen">
  <h2>GAME OVER</h2>
  <h3 id="final"></h3>
  <button onclick="location.reload()">RESTART</button>
</div>

<script>
// ===== SUPABASE =====
const sb = supabase.createClient(
  'https://sbmhioyxdjecyumarhek.supabase.co',
  'sb_publishable_j5hylMpKHP5aRRJbp03gAg_Rd_lPZn4'
);

// ===== STATE =====
let G = {room:null,name:null,isHost:false,players:[],channel:null,q:[],i:0,score:0};

// ===== QUESTIONS =====
const Q = [
 {q:"Naruto MC?",a:["Naruto","Sasuke","Sakura","Lee"],c:0},
 {q:"Luffy power?",a:["Fire","Rubber","Ice","Wind"],c:1},
 {q:"AOT hero?",a:["Levi","Eren","Armin","Reiner"],c:1},
 {q:"Death Note user?",a:["L","Light","Near","Misa"],c:1},
 {q:"Tanjiro style?",a:["Fire","Water","Wind","Thunder"],c:1},
 {q:"One Punch hero?",a:["Saitama","Naruto","Goku","Eren"],c:0}
];

function buildQ(){
  return Q.sort(()=>Math.random()-0.5);
}

// ===== UI =====
function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// ===== CODE =====
function gen(){
 let s="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
 return Array(4).fill().map(()=>s[Math.random()*s.length|0]).join('');
}

// ===== REALTIME =====
function sub(code){
 if(G.channel) sb.removeChannel(G.channel);

 G.channel = sb.channel("room-"+code,{config:{broadcast:{self:true}}});

 G.channel
  .on('broadcast',{event:'join'},({payload})=>{
    if(!G.players.includes(payload)){
      G.players.push(payload);
      render();
    }
  })
  .on('broadcast',{event:'start'},({payload})=>{
    G.q = payload;
    startQuiz();
  })
  .subscribe(async(s)=>{
    if(s=="SUBSCRIBED"){
      await G.channel.send({type:'broadcast',event:'join',payload:G.name});
    }
  });
}

// ===== CREATE =====
function createGame(){
 let n = document.getElementById('host-name').value.trim();
 if(!n) return alert("Enter name");

 G.name=n; G.isHost=true;
 G.room=gen(); G.players=[n];

 document.getElementById('roomCode').innerText = G.room;

 show('host'); render();
 sub(G.room);
}

// ===== JOIN =====
function joinGame(){
 let n = document.getElementById('join-name').value.trim();
 let c = document.getElementById('code').value.toUpperCase().trim();

 if(!n) return alert("Enter name");
 if(c.length!=4) return alert("Enter code");

 G.name=n; G.room=c;
 show('guest');
 sub(c);
}

// ===== RENDER =====
function render(){
 let html = G.players.map(p=>`<div class="player">${p}</div>`).join('');
 document.getElementById('players').innerHTML = html;
 document.getElementById('players2').innerHTML = html;
}

// ===== START =====
async function startGame(){
 if(G.players.length<2) return alert("Need 2 players");

 let q = buildQ();

 await G.channel.send({
  type:'broadcast',
  event:'start',
  payload:q
 });
}

// ===== QUIZ =====
function startQuiz(){
 G.i=0; G.score=0;
 show('quiz');
 loadQ();
}

function loadQ(){
 let x = G.q[G.i];
 document.getElementById('q').innerText = x.q;
 document.getElementById('score').innerText = G.score;

 document.getElementById('opts').innerHTML = x.a.map((o,i)=>
  `<button onclick="ans(${i})">${o}</button>`
 ).join('');
}

function ans(i){
 let x = G.q[G.i];

 if(i===x.c) G.score++;

 G.i++;
 if(G.i < G.q.length) loadQ();
 else endGame();
}

function endGame(){
 document.getElementById('final').innerText = "Score: "+G.score;
 show('gameover');
}
</script>

</body>
</html>
