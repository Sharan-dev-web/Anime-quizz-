<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Quiz Multiplayer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff2d78;
  --cyan: #00e5ff;
  --yellow: #ffe600;
  --purple: #9b30ff;
  --orange: #ff7c1f;
  --green: #00ff9f;
  --dark: #0a0a1a;
  --card: #12122a;
  --border: rgba(255,255,255,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--dark);
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── ANIMATED BG ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(155,48,255,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,229,255,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(255,45,120,0.07) 0%, transparent 70%);
  pointer-events: none;
}

/* ── STARS ── */
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 35%, rgba(255,230,0,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 70%, rgba(0,229,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 60%, rgba(255,45,120,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 5%  50%, rgba(155,48,255,0.6) 0%, transparent 100%);
}

/* ── WRAPPER ── */
#app {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
}

/* ── LOGO ── */
.logo {
  font-family: 'Bangers', cursive;
  font-size: clamp(2.5rem, 8vw, 5rem);
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--pink) 0%, var(--yellow) 40%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(255,45,120,0.5));
  margin-bottom: 6px;
  animation: logoPulse 3s ease-in-out infinite;
}

@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(255,45,120,0.4)); }
  50%      { filter: drop-shadow(0 0 40px rgba(0,229,255,0.6)); }
}

.subtitle {
  font-size: 0.85rem;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 40px;
}

/* ── CARD ── */
.card {
  background: rgba(18,18,42,0.85);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 40px;
  width: 100%; max-width: 460px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 60px rgba(155,48,255,0.15), 0 20px 60px rgba(0,0,0,0.5);
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes cardIn {
  from { opacity:0; transform: translateY(30px) scale(0.95); }
  to   { opacity:1; transform: translateY(0)    scale(1);    }
}

.card h2 {
  font-family: 'Bangers', cursive;
  font-size: 1.8rem;
  letter-spacing: 3px;
  margin-bottom: 24px;
  color: var(--yellow);
}

/* ── SCREEN TOGGLE ── */
.screen { display: none; }
.active { display: block; }

/* ── INPUTS ── */
input {
  width: 100%;
  padding: 14px 18px;
  margin: 8px 0;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

input::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }

input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.15);
}

/* ── BUTTONS ── */
.btn {
  display: inline-block;
  width: 100%;
  padding: 15px 28px;
  margin: 10px 0 0;
  border: none;
  border-radius: 14px;
  font-family: 'Bangers', cursive;
  font-size: 1.3rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  position: relative; overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.15s;
}

.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn:hover::after { opacity: 0.06; }
.btn:active { transform: translateY(1px); }

.btn-pink {
  background: linear-gradient(135deg, #ff2d78, #ff6b35);
  color: white;
  box-shadow: 0 6px 30px rgba(255,45,120,0.4);
}

.btn-cyan {
  background: linear-gradient(135deg, #00b4d8, #00e5ff);
  color: #001a2c;
  box-shadow: 0 6px 30px rgba(0,229,255,0.35);
}

.btn-purple {
  background: linear-gradient(135deg, #7b2ff7, #c15aff);
  color: white;
  box-shadow: 0 6px 30px rgba(155,48,255,0.45);
}

.btn-green {
  background: linear-gradient(135deg, #00c875, #00ff9f);
  color: #001a10;
  box-shadow: 0 6px 30px rgba(0,255,159,0.35);
}

.btn-yellow {
  background: linear-gradient(135deg, #f5c800, #ffe600);
  color: #1a1000;
  box-shadow: 0 6px 30px rgba(255,230,0,0.4);
}

.btn-ghost {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.6);
  font-size: 0.9rem;
  font-family: 'Nunito', sans-serif;
  letter-spacing: 0;
  font-weight: 700;
  padding: 10px;
  box-shadow: none;
  margin-top: 12px;
}

.btn-ghost:hover { border-color: rgba(255,255,255,0.5); color: white; }

.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

/* ── ROOM CODE ── */
.room-code-box {
  background: linear-gradient(135deg, rgba(255,230,0,0.12), rgba(255,45,120,0.12));
  border: 2px dashed rgba(255,230,0,0.4);
  border-radius: 14px;
  padding: 18px;
  margin: 16px 0;
  text-align: center;
}

.room-code-label {
  font-size: 0.75rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 6px;
}

.room-code-value {
  font-family: 'Bangers', cursive;
  font-size: 3.5rem;
  letter-spacing: 12px;
  color: var(--yellow);
  filter: drop-shadow(0 0 20px rgba(255,230,0,0.5));
}

/* ── PLAYER LIST ── */
.players-list {
  margin: 16px 0;
  max-height: 200px;
  overflow-y: auto;
}

.player-tag {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  margin: 6px 0;
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  font-weight: 700;
  border-left: 3px solid var(--cyan);
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity:0; transform: translateX(-15px); }
  to   { opacity:1; transform: translateX(0);     }
}

.player-tag::before {
  content: '▶';
  color: var(--cyan);
  font-size: 0.6rem;
}

.player-count {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* ── WAIT SCREEN ── */
.waiting-pulse {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--cyan);
  animation: blink 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; background: var(--pink); }
.dot:nth-child(3) { animation-delay: 0.4s; background: var(--yellow); }

@keyframes blink {
  0%,100% { opacity:0.2; transform: scale(0.8); }
  50%      { opacity:1;   transform: scale(1.2); }
}

/* ── QUIZ ── */
#quiz.active {
  width: 100%;
  max-width: 680px;
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.q-counter {
  font-family: 'Bangers', cursive;
  font-size: 1.1rem;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
}

.progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 99px;
  margin: 0 16px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  transition: width 0.4s ease;
  box-shadow: 0 0 10px rgba(0,229,255,0.6);
}

.question-card {
  background: rgba(18,18,42,0.9);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  margin-bottom: 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 60px rgba(155,48,255,0.1), 0 20px 60px rgba(0,0,0,0.5);
}

.q-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  font-family: 'Bangers', cursive;
  font-size: 0.8rem;
  letter-spacing: 3px;
  padding: 4px 14px;
  border-radius: 99px;
  margin-bottom: 16px;
  color: white;
}

#q {
  font-size: clamp(1.2rem, 3vw, 1.6rem);
  font-weight: 900;
  line-height: 1.4;
  color: white;
}

#opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.opt-btn {
  width: 100%;
  padding: 18px 16px;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex; align-items: center; gap: 10px;
}

.opt-btn:hover {
  background: rgba(0,229,255,0.12);
  border-color: var(--cyan);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(0,229,255,0.2);
}

.opt-btn.correct {
  background: rgba(0,255,159,0.2);
  border-color: var(--green);
  box-shadow: 0 0 20px rgba(0,255,159,0.3);
}

.opt-btn.wrong {
  background: rgba(255,45,120,0.2);
  border-color: var(--pink);
  box-shadow: 0 0 20px rgba(255,45,120,0.3);
}

.opt-btn:disabled { cursor: default; transform: none !important; }

.opt-letter {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bangers', cursive;
  font-size: 1rem;
  letter-spacing: 1px;
  flex-shrink: 0;
  color: var(--cyan);
}

/* ── FEEDBACK TOAST ── */
#feedback-toast {
  position: fixed;
  top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px);
  z-index: 999;
  padding: 14px 32px;
  border-radius: 99px;
  font-family: 'Bangers', cursive;
  font-size: 1.4rem;
  letter-spacing: 3px;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
  opacity: 0;
  pointer-events: none;
}

#feedback-toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

#feedback-toast.correct {
  background: linear-gradient(135deg, #00c875, #00ff9f);
  color: #001a10;
  box-shadow: 0 8px 40px rgba(0,255,159,0.5);
}

#feedback-toast.wrong {
  background: linear-gradient(135deg, #ff2d78, #ff6b35);
  color: white;
  box-shadow: 0 8px 40px rgba(255,45,120,0.5);
}

/* ── GAME OVER ── */
.game-over-card {
  background: rgba(18,18,42,0.9);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  text-align: center;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 80px rgba(255,230,0,0.15);
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

.trophy {
  font-size: 5rem;
  margin-bottom: 12px;
  animation: trophyBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}

@keyframes trophyBounce {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0);      opacity: 1; }
}

.game-over-title {
  font-family: 'Bangers', cursive;
  font-size: 3rem;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--yellow), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.score-display {
  font-size: 1.2rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 32px;
}

.score-display span {
  font-family: 'Bangers', cursive;
  font-size: 2.2rem;
  letter-spacing: 2px;
  color: var(--cyan);
}

/* ── DIVIDER ── */
.divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.07);
  margin: 20px 0;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 99px; }

/* ── RESPONSIVE ── */
@media (max-width: 500px) {
  #opts { grid-template-columns: 1fr; }
  .card { padding: 28px 22px; }
  .question-card { padding: 22px; }
  .room-code-value { font-size: 2.8rem; letter-spacing: 8px; }
}
</style>
</head>

<body>
<div class="stars"></div>
<div id="feedback-toast" id="toast"></div>

<div id="app">
  <div class="logo">ANIME QUIZ</div>
  <div class="subtitle">⚡ Multiplayer Battle ⚡</div>

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="card" style="text-align:center;">
      <div style="font-size:3.5rem;margin-bottom:16px;">🎮</div>
      <h2 style="margin-bottom:8px;">READY TO BATTLE?</h2>
      <p style="color:rgba(255,255,255,0.4);font-size:0.9rem;margin-bottom:28px;">25 questions · Multiplayer · Anime trivia</p>
      <div class="btn-row">
        <button class="btn btn-pink" onclick="show('create')">✦ CREATE</button>
        <button class="btn btn-cyan" onclick="show('join')">⤷ JOIN</button>
      </div>
    </div>
  </div>

  <!-- CREATE -->
  <div id="create" class="screen">
    <div class="card">
      <h2>🎌 CREATE ROOM</h2>
      <input id="host-name" placeholder="Your name..." maxlength="20">
      <button class="btn btn-pink" onclick="createGame()">CREATE ROOM ✦</button>
      <button class="btn btn-ghost" onclick="show('home')">← Back</button>
    </div>
  </div>

  <!-- JOIN -->
  <div id="join" class="screen">
    <div class="card">
      <h2>⚡ JOIN ROOM</h2>
      <input id="join-name" placeholder="Your name..." maxlength="20">
      <input id="code" placeholder="Room code (4 chars)" maxlength="4" style="letter-spacing:6px;text-transform:uppercase;font-size:1.2rem;">
      <button class="btn btn-cyan" onclick="joinGame()">JOIN BATTLE ⤷</button>
      <button class="btn btn-ghost" onclick="show('home')">← Back</button>
    </div>
  </div>

  <!-- WAIT HOST -->
  <div id="host" class="screen">
    <div class="card">
      <h2>🏠 YOUR ROOM</h2>
      <div class="room-code-box">
        <div class="room-code-label">Share this code</div>
        <div class="room-code-value" id="roomCode">----</div>
      </div>
      <div class="player-count" id="playerCount">0 players joined</div>
      <div class="players-list" id="players"></div>
      <hr class="divider">
      <button class="btn btn-green" onclick="startGame()">⚔️ START GAME</button>
    </div>
  </div>

  <!-- WAIT GUEST -->
  <div id="guest" class="screen">
    <div class="card" style="text-align:center;">
      <div class="waiting-pulse">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        Waiting for host
      </div>
      <div style="font-size:2.5rem;margin-bottom:12px;">⏳</div>
      <h2>LOBBY</h2>
      <div class="player-count" id="playerCount2" style="margin-top:12px;"></div>
      <div class="players-list" id="players2"></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div class="quiz-header">
      <div class="q-counter" id="qCounter">Q 1/25</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
      </div>
      <div style="font-family:'Bangers';font-size:1rem;letter-spacing:2px;color:var(--yellow)">
        <span id="scoreDisplay">0</span> ✦
      </div>
    </div>
    <div class="question-card">
      <div class="q-badge">QUESTION</div>
      <h2 id="q" style="font-family:'Nunito';font-size:1.4rem;font-weight:900;"></h2>
    </div>
    <div id="opts"></div>
  </div>

  <!-- GAME OVER -->
  <div id="gameover" class="screen">
    <div class="game-over-card">
      <div class="trophy">🏆</div>
      <div class="game-over-title">GAME OVER!</div>
      <div class="score-display">You scored <span id="finalScore">0</span> / 25</div>
      <button class="btn btn-yellow" onclick="location.reload()">🔄 PLAY AGAIN</button>
    </div>
  </div>

</div><!-- /app -->

  {q:"Who is the genius scientist in Dr. Stone?",a:["Senku","Taiju","Gen","Chrome"],c:0},
];

const rare = [
  {q:"What device does Okabe use in Steins;Gate?",a:["Phone","Clock","Portal","Microwave"],c:3},
  {q:"What is the name of Guts' massive sword in Berserk?",a:["Dragonslayer","Excalibur","Blade","Katana"],c:0},
  {q:"Who is the main character of Vinland Saga?",a:["Thorfinn","Canute","Bjorn","Askeladd"],c:0},
  {q:"What is Subaru's ability called in Re:Zero?",a:["Time Loop","Death Reset","Return by Death","Magic"],c:2},
  {q:"What is the duo's name in No Game No Life?",a:["Alpha","Blank","Zero","Void"],c:1},
];

let used = new Set();

function getQ(arr){
  let x;
  do { x = arr[Math.floor(Math.random()*arr.length)]; }
  while(used.has(x.q));
  used.add(x.q);
  return x;
}

function buildQ(){
  used.clear();
  let q = [];
  for(let i=0;i<20;i++) q.push(getQ(famous));
  for(let i=0;i<5;i++) q.push(getQ(rare));
  return q.sort(()=>Math.random()-0.5);
}

// ===== UI =====
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== CODE GEN =====
function gen(){
  let s="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array(4).fill().map(()=>s[Math.random()*s.length|0]).join('');
}

// ===== SUBSCRIBE (UNTOUCHED LOGIC) =====
function sub(code){
  if(G.channel) sb.removeChannel(G.channel);

  G.channel = sb.channel("room-"+code, {config:{broadcast:{self:true}}});

  G.channel
    .on('broadcast',{event:'join'},({payload})=>{
      if(!G.players.includes(payload.name)){
        G.players.push(payload.name);
        render();
      }
    })
    .on('broadcast',{event:'start'},({payload})=>{
      G.q = payload;
      startQuiz();
    })
    .subscribe(async(s)=>{
      if(s=="SUBSCRIBED"){
        await G.channel.send({type:'broadcast',event:'join',payload:G.name});
      }
    });
}

// ===== CREATE (BUG FIXED: getElementById) =====
function createGame(){
  let n = document.getElementById('host-name').value.trim();
  if(!n) return showToast("Enter your name!", "wrong");

  G.name=n; G.isHost=true;
  G.room=gen(); G.players=[n];

  document.getElementById('roomCode').innerText = G.room;

  show('host'); render();
  sub(G.room);
}

// ===== JOIN (BUG FIXED: getElementById) =====
function joinGame(){
  let n = document.getElementById('join-name').value.trim();
  let c = document.getElementById('code').value.toUpperCase().trim();
  if(!n) return showToast("Enter your name!", "wrong");
  if(c.length!=4) return showToast("Enter a 4-char room code!", "wrong");

  G.name=n; G.room=c;
  G.players=[n];

  show('guest'); render();
  sub(c);
}

// ===== RENDER (BUG FIXED: getElementById) =====
function render(){
  const html = G.players.map(p=>`<div class="player-tag">${p}</div>`).join('');
  const el1 = document.getElementById('players');
  const el2 = document.getElementById('players2');
  if(el1) el1.innerHTML = html;
  if(el2) el2.innerHTML = html;

  const c1 = document.getElementById('playerCount');
  const c2 = document.getElementById('playerCount2');
  const txt = G.players.length + ' player' + (G.players.length!==1?'s':'') + ' in lobby';
  if(c1) c1.innerText = txt;
  if(c2) c2.innerText = txt;
}

// ===== START HOST =====
async function startGame(){
  if(G.players.length<2) return showToast("Need at least 2 players!", "wrong");

  let q = buildQ();
  await G.channel.send({type:'broadcast',event:'start',payload:q});
  // host also starts — handled by broadcast self:true which triggers the listener
}

// ===== QUIZ =====
function startQuiz(){
  G.i=0; G.score=0;
  show('quiz');
  loadQ();
}

function loadQ(){
  let x = G.q[G.i];
  document.getElementById('q').innerText = x.q;
  document.getElementById('qCounter').innerText = `Q ${G.i+1}/25`;
  document.getElementById('progressBar').style.width = ((G.i/25)*100)+'%';
  document.getElementById('scoreDisplay').innerText = G.score;

  const letters = ['A','B','C','D'];
  document.getElementById('opts').innerHTML = x.a.map((o,i)=>
    `<button class="opt-btn" onclick="ans(${i},this)" id="opt${i}">
       <span class="opt-letter">${letters[i]}</span>${o}
     </button>`
  ).join('');
}

function ans(i, btn){
  let x = G.q[G.i];
  const correct = (i===x.c);

  // disable all buttons
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);

  // highlight
  btn.classList.add(correct?'correct':'wrong');
  document.getElementById('opt'+x.c).classList.add('correct');

  if(correct){
    G.score++;
    showToast('✦ CORRECT! +1', 'correct');
  } else {
    showToast('✗ WRONG!', 'wrong');
  }

  setTimeout(()=>{
    G.i++;
    if(G.i<25) loadQ();
    else endGame();
  }, 1100);
}

function endGame(){
  document.getElementById('finalScore').innerText = G.score;
  document.getElementById('progressBar').style.width = '100%';
  show('gameover');
}

// ===== TOAST =====
function showToast(msg, type){
  const t = document.getElementById('feedback-toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.className=''; }, 1500);
}
</script>
