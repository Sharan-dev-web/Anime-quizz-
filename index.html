<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Room</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.screen { display:none; }
.screen.active { display:block; }

input { padding:10px; margin:5px; }

.player-chip {
  background:#222;
  padding:10px;
  margin:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="screen-home" class="screen active">
  <h1>Create / Join</h1>

  <input id="host-name" placeholder="Your Name">
  <br>
  <button onclick="createGame()">Create</button>

  <hr>

  <input id="join-name" placeholder="Your Name"><br>

  <input id="cc0" maxlength="1">
  <input id="cc1" maxlength="1">
  <input id="cc2" maxlength="1">
  <input id="cc3" maxlength="1">
  <br>

  <button onclick="joinGame()">Join</button>
</div>

<div id="screen-waiting-host" class="screen">
  <h2>Code: <span id="display-code"></span></h2>
  <h3>Players</h3>
  <div id="host-players-list"></div>
</div>

<div id="screen-waiting-guest" class="screen">
  <h2>Joined</h2>
  <div id="guest-players-list"></div>
</div>

<script>
// ===== SUPABASE =====
const SUPABASE_URL = 'https://sbmhioyxdjecyumarhek.supabase.co';
const SUPABASE_KEY = 'sb_publishable_j5hylMpKHP5aRRJbp03gAg_Rd_lPZn4';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== STATE =====
let G = {
  roomCode:null,
  myName:null,
  isHost:false,
  players:[],
  channel:null
};

// ===== CODE =====
function genCode(){
  return Math.random().toString(36).substring(2,6).toUpperCase();
}

// ===== SCREEN =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== RENDER =====
function renderPlayers(){
  const host = document.getElementById('host-players-list');
  const guest = document.getElementById('guest-players-list');

  if(host) host.innerHTML='';
  if(guest) guest.innerHTML='';

  G.players.forEach(p=>{
    const div=document.createElement('div');
    div.className='player-chip';
    div.innerHTML = p.avatar + " " + p.name;

    if(host) host.appendChild(div);
    if(guest) guest.appendChild(div.cloneNode(true));
  });
}

// ===== REALTIME =====
function subscribeChannel(code){

  if(G.channel) sb.removeChannel(G.channel);

  G.channel = sb.channel("room-"+code);

  // JOIN EVENT
  G.channel.on('broadcast',{event:'join'},({payload})=>{

    if(!G.players.find(p=>p.name===payload.name)){
      G.players.push(payload);
      renderPlayers();
    }

    // HOST sync
    if(G.isHost){
      G.channel.send({
        type:'broadcast',
        event:'players',
        payload:G.players
      });
    }

  });

  // FULL PLAYER LIST
  G.channel.on('broadcast',{event:'players'},({payload})=>{
    G.players = payload;
    renderPlayers();
  });

  G.channel.subscribe(async(status)=>{
    if(status==="SUBSCRIBED"){

      await G.channel.send({
        type:'broadcast',
        event:'join',
        payload:{
          name:G.myName,
          avatar: G.isHost ? "👑" : "🙂"
        }
      });

    }
  });

}

// ===== CREATE =====
function createGame(){
  const name = document.getElementById('host-name').value.trim();
  if(!name) return alert("Enter name");

  const code = genCode();

  G.roomCode = code;
  G.myName = name;
  G.isHost = true;

  G.players = [{name:name, avatar:"👑"}];

  document.getElementById('display-code').innerText = code;

  showScreen('screen-waiting-host');
  renderPlayers();

  subscribeChannel(code);
}

// ===== JOIN =====
function joinGame(){
  const name = document.getElementById('join-name').value.trim();
  if(!name) return alert("Enter name");

  const code = [
    cc0.value,cc1.value,cc2.value,cc3.value
  ].join('').toUpperCase();

  if(code.length!==4) return alert("Enter code");

  G.roomCode = code;
  G.myName = name;
  G.isHost = false;

  G.players = [{name:name, avatar:"🙂"}];

  showScreen('screen-waiting-guest');
  renderPlayers();

  subscribeChannel(code);
}
</script>

</body>
</html>
